<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  <!-- Accent orbs -->
  <circle cx="1050" cy="100" r="350" fill="#ff4d1c" opacity="0.10"/>
  <circle cx="150" cy="580" r="250" fill="#ff8c00" opacity="0.06"/>
  <circle cx="600" cy="315" r="400" fill="#ff4d1c" opacity="0.03"/>
  <!-- XEKIE wordmark -->
  <text x="600" y="340" 
    font-family="'Syne', 'Arial Black', sans-serif" 
    font-weight="800" 
    font-size="220" 
    text-anchor="middle" 
    letter-spacing="-8"
    fill="#fafaf8">
    <tspan fill="#ff4d1c">XE</tspan>KIE
  </text>
  <!-- Tagline -->
  <text x="600" y="420" 
    font-family="'Syne', Arial, sans-serif" 
    font-weight="400" 
    font-size="26" 
    text-anchor="middle" 
    letter-spacing="14"
